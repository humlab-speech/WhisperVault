# WhisperX nginx sidecar — runs as the unprivileged 'nginx' user (uid 101).
#
# Design choices
# ──────────────
#  • No 'user' directive: the container starts as 'nginx', so nginx cannot and
#    need not change its own user.  Omitting the directive avoids a startup error.
#  • Port 8080: no CAP_NET_BIND_SERVICE needed — any process can bind to ports
#    above 1023.
#  • All temp / pid paths under /tmp: the container is started --read-only;
#    only /tmp is writable (via a tmpfs mount).
#  • Logs → stdout / stderr: captured natively by podman/container runtime.
#  • Large timeouts: CPU-based transcription on a 20-minute file can take 15+
#    minutes.  Set timeouts generously; the client can always cancel.

worker_processes  auto;

pid        /tmp/nginx.pid;

error_log  /dev/stderr  warn;

events {
    worker_connections  64;
}

http {
    # ── all writable state goes to /tmp ──────────────────────────────────
    client_body_temp_path  /tmp/client_body;
    proxy_temp_path        /tmp/proxy;
    fastcgi_temp_path      /tmp/fastcgi;
    uwsgi_temp_path        /tmp/uwsgi;
    scgi_temp_path         /tmp/scgi;

    access_log  /dev/stdout;

    # ── upload limit: audio files can be large ───────────────────────────
    client_max_body_size  2G;

    # ── timeouts: transcription is slow on CPU ───────────────────────────
    # How long to wait for the upstream (whisperx) to start responding.
    proxy_connect_timeout   30s;
    # How long to wait for a single read/write on the upstream connection.
    # Set well above the worst-case transcription time (e.g. 20-min file
    # taking ~15 min on CPU).
    proxy_read_timeout    3600s;
    proxy_send_timeout    3600s;
    # How long the client can be silent while sending the request body
    # (i.e. uploading the audio file).
    client_body_timeout    300s;
    # How long nginx waits for the client to read a response chunk.
    send_timeout           120s;

    server {
        listen       8080;
        server_name  _;

        # ── proxy everything to the whisperx UDS ─────────────────────────
        location / {
            proxy_pass         http://unix:/run/api/whisperx.sock;

            proxy_http_version 1.1;
            proxy_set_header   Host        $host;
            proxy_set_header   X-Real-IP   $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;

            # Disable buffering: audio uploads can be large; we want nginx to
            # stream the body to the upstream rather than spool it to disk.
            proxy_request_buffering  off;

            # Response buffering can stay on (JSON response is small).
        }
    }
}
